<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중등부 여름수련회 — 교사용 운영 설명서</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#FFFFFF;--bg:#EEF1FA;
  --text:#1A1A2E;--sub:#555566;--light:#9999AA;--border:#E4E8F2;
  --primary:#2563EB;
  --pink:#EC4899;--blue:#3B82F6;--purple:#8B5CF6;--orange:#F59E0B;--green:#10B981;--red:#DC2626;
  --shadow:0 4px 18px rgba(40,50,90,.10);
  --shadow-lg:0 12px 36px rgba(40,50,90,.20);
}
html,body{overflow-x:hidden}
body{font-family:-apple-system,'Pretendard','Noto Sans KR',sans-serif;color:var(--text);
  background:radial-gradient(1100px 560px at 85% -10%,#E0E7FF 0%,transparent 60%),
             radial-gradient(800px 460px at -5% 15%,#EDE9FE 0%,transparent 55%),var(--bg);
  min-height:100vh}

.guide-strip{background:linear-gradient(90deg,#1E3A8A,#4338CA,#1E3A8A);background-size:200% 100%;animation:shine 7s linear infinite;color:#fff;text-align:center;font-size:.8rem;font-weight:800;padding:9px 14px;line-height:1.4}
@keyframes shine{to{background-position:200% 0}}

/* 탑바 */
.topbar{background:rgba(14,30,80,.96);backdrop-filter:blur(12px);padding:0 16px;position:sticky;top:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(14,30,80,.25)}
.site-name{font-size:.96rem;font-weight:800;color:white;display:flex;align-items:center;gap:7px}
.site-name .cross{color:#FBBF24}
.role-tag{font-size:.72rem;font-weight:800;color:#0E1E50;background:#FBBF24;padding:5px 12px;border-radius:50px}

/* 히어로 (컴팩트) */
.hero{position:relative;text-align:center;background:linear-gradient(135deg,#0E1E50,#3730A3 60%,#6D28D9);overflow:hidden;padding:26px 20px 24px}
.hero-stars{position:absolute;inset:0}
.star-dot{position:absolute;background:white;border-radius:50%;animation:tw ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:1}}
.hero-content{position:relative;z-index:5}
.hero-cross{font-size:1.9rem;filter:drop-shadow(0 0 14px rgba(251,191,36,.9));display:block;margin-bottom:8px}
.hero-badge{display:inline-block;padding:5px 16px;border-radius:50px;background:rgba(251,191,36,.22);border:1px solid rgba(251,191,36,.5);font-size:.72rem;font-weight:700;color:#FBBF24;margin-bottom:10px}
.hero h1{font-size:clamp(1.25rem,4.5vw,1.7rem);font-weight:900;color:white;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.9);font-size:.84rem}

/* 카테고리 홈 */
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px}
.home-hint{text-align:center;font-size:.82rem;color:var(--sub);margin-bottom:16px}
.home-hint b{color:var(--primary)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-card{position:relative;background:var(--white);border-radius:20px;padding:18px 16px;cursor:pointer;box-shadow:var(--shadow);border:1px solid transparent;transition:.2s;overflow:hidden;text-align:left}
.cat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--cc)}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--cc)}
.cat-card.wide{grid-column:1 / -1;display:flex;align-items:center;gap:16px}
.cat-ic{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;background:var(--cl);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.cat-card.wide .cat-ic{width:58px;height:58px;font-size:2rem}
.cat-body{flex:1;min-width:0}
.cat-title{font-size:1rem;font-weight:900;margin:11px 0 3px;display:flex;align-items:center;gap:7px}
.cat-card.wide .cat-title{margin-top:0;font-size:1.12rem}
.cat-desc{font-size:.73rem;color:var(--sub);line-height:1.45}
.cat-count{position:absolute;top:16px;right:14px;font-size:.62rem;font-weight:800;color:var(--cc);background:var(--cl);padding:3px 9px;border-radius:50px}
.cat-card.wide .cat-count{position:static}
.cat-arrow{font-size:1.3rem;color:var(--cc);font-weight:900;flex-shrink:0}

/* 카테고리 상세 오버레이 */
.cat-ov{position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;display:none}
.cat-ov.open{display:block;animation:slideUp .32s cubic-bezier(.3,.9,.3,1)}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.cat-topbar{position:sticky;top:0;z-index:30;height:54px;display:flex;align-items:center;gap:12px;padding:0 14px;color:#fff;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.cat-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);border:none;color:white;font-size:1.1rem;cursor:pointer;flex-shrink:0}
.cat-toptit{font-size:.98rem;font-weight:800}
.cat-wrap{max-width:680px;margin:0 auto;padding:18px 16px 70px}
.cat-lead{font-size:.84rem;color:var(--sub);line-height:1.55;background:var(--white);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:16px}

/* 항목 카드 */
.item-card{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;transition:.16s;border:1px solid transparent}
.item-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--ic)}
.item-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:.9rem;font-weight:800;line-height:1.3}
.item-desc{font-size:.7rem;color:var(--sub);margin-top:2px;line-height:1.4}
.item-open{border:none;color:white;font-size:.76rem;font-weight:800;padding:9px 15px;border-radius:11px;cursor:pointer;font-family:inherit;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.13)}
.s-blue{background:#DBEAFE}.s-green{background:#D1FAE5}.s-orange{background:#FEF3C7}.s-pink{background:#FCE7F3}.s-purple{background:#EDE9FE}.s-red{background:#FEE2E2}.s-indigo{background:#E0E7FF}.s-teal{background:#CCFBF1}

/* 프로그램 타임라인 (카테고리 안) */
.fa-day-header{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.fa-day-pill{color:white;font-size:.8rem;font-weight:800;padding:7px 15px;border-radius:50px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.fa-day-line{flex:1;height:2px;background:var(--border)}
.fa-sub{font-size:.66rem;font-weight:800;letter-spacing:.06em;padding:11px 2px 6px}
.fa-track{position:relative;padding-left:26px}
.fa-track::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2.5px;background:linear-gradient(180deg,var(--tc,#C4B5FD),transparent);border-radius:2px}
.fa-item{position:relative;display:flex;align-items:center;gap:11px;background:var(--white);border-radius:15px;padding:12px 13px;box-shadow:var(--shadow);margin-bottom:10px;transition:.16s;cursor:pointer;border:1px solid transparent}
.fa-item:hover{transform:translateY(-2px) translateX(2px);box-shadow:var(--shadow-lg);border-color:var(--ic)}
.fa-item::before{content:'';position:absolute;left:-21px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:var(--ic,#8B5CF6);border:2.5px solid #fff;box-shadow:0 0 0 2px var(--ic,#8B5CF6)}
.fa-num{font-size:.62rem;font-weight:800;padding:6px 7px;border-radius:9px;flex-shrink:0;min-width:42px;text-align:center}
.fa-info{flex:1;min-width:0}
.fa-name{font-size:.86rem;font-weight:800;line-height:1.3}
.fa-time{font-size:.6rem;color:var(--light);font-weight:600;margin-left:5px;white-space:nowrap}
.fa-desc{font-size:.69rem;color:var(--sub);margin-top:2px;line-height:1.4}
.fa-tags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.fa-tag{font-size:.56rem;font-weight:700;padding:2px 7px;border-radius:50px}
.tag-key{background:#FEF3C7;color:#B45309}.tag-nokey{background:#DCFCE7;color:#16A34A}.tag-team{background:#EDE9FE;color:#6D28D9}
.fa-open-btn{border:none;color:white;font-size:.74rem;font-weight:800;padding:9px 14px;border-radius:11px;cursor:pointer;font-family:inherit;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.13)}
.fa-worship{position:relative;display:flex;align-items:center;gap:11px;background:linear-gradient(135deg,#FFF7ED,#FFFBEB);border:1px dashed #FCD9A8;border-radius:14px;padding:11px 13px;margin-bottom:10px}
.fa-worship::before{content:'';position:absolute;left:-21px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:#FBBF24;border:2.5px solid #fff;box-shadow:0 0 0 2px #FBBF24}
.fa-worship-icon{font-size:1.3rem}
.fa-worship-txt{font-size:.84rem;font-weight:800}
.fa-worship-sub{font-size:.66rem;color:var(--sub)}

/* 팝업 */
.pop-overlay{position:fixed;inset:0;background:rgba(10,15,40,.6);backdrop-filter:blur(4px);z-index:600;display:none;align-items:flex-end;justify-content:center}
.pop-overlay.open{display:flex}
@media(min-width:560px){.pop-overlay{align-items:center;padding:20px}}
.pop{background:var(--white);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;border-radius:24px 24px 0 0;animation:popup .3s cubic-bezier(.3,1,.4,1)}
@media(min-width:560px){.pop{border-radius:24px}}
@keyframes popup{from{transform:translateY(50px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.pop-head{padding:24px 20px 20px;color:white;position:sticky;top:0;overflow:hidden}
.pop-head::after{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.12)}
.pop-icon-circle{width:52px;height:52px;border-radius:15px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:11px;position:relative;z-index:2}
.pop-badge{display:inline-block;font-size:.64rem;font-weight:800;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:50px;margin-bottom:8px;position:relative;z-index:2}
.pop-title{font-size:1.18rem;font-weight:900;line-height:1.3;position:relative;z-index:2}
.pop-time{font-size:.74rem;opacity:.94;margin-top:6px;font-weight:600;position:relative;z-index:2}
.pop-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.25);border:none;color:white;font-size:1.05rem;cursor:pointer;z-index:3}
.pop-body{padding:20px}
.pop-what{font-size:.9rem;line-height:1.7;color:var(--text);background:linear-gradient(135deg,#F4F6FF,#F0F0FB);border-radius:14px;padding:14px 16px;margin-bottom:18px;border:1px solid #EAEAF7}
.pop-sec-t{font-size:.79rem;font-weight:800;color:var(--c2,#4338CA);letter-spacing:.02em;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.pop-spec{list-style:none;margin-bottom:18px;background:#F8FAFD;border:1px solid #EDF1F7;border-radius:14px;padding:6px 14px}
.pop-spec li{font-size:.82rem;line-height:1.5;color:var(--sub);padding:9px 0;border-bottom:1px solid #EDF1F7;display:flex;gap:10px}
.pop-spec li:last-child{border-bottom:none}
.pop-spec b{color:var(--text);flex-shrink:0;min-width:78px}
.pop-steps{counter-reset:s;margin-bottom:18px}
.pop-step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.pop-step::before{counter-increment:s;content:counter(s);flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--c,#2563EB);color:white;font-size:.76rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;box-shadow:0 3px 8px rgba(0,0,0,.15)}
.pop-step span{font-size:.88rem;line-height:1.55;color:var(--text);padding-top:3px}
.pop-tip{background:linear-gradient(135deg,#FFFBEB,#FEF9C3);border:1px solid #FDE68A;border-radius:14px;padding:14px 16px;font-size:.85rem;line-height:1.65;color:#92400E}
.pop-tip b{color:#B45309}
.pop-warn{background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:14px 16px;font-size:.85rem;line-height:1.65;color:#991B1B;margin-top:10px}
.pw-box{display:inline-block;background:#FEF2F2;border:1.5px solid #FCA5A5;color:#B91C1C;font-weight:900;font-family:monospace;padding:2px 12px;border-radius:8px;font-size:1rem;letter-spacing:.15em}
.code-chip{background:#F1F5F9;border:1px solid #E2E8F0;border-radius:6px;padding:1px 7px;font-family:monospace;font-size:.82rem;color:#475569}
</style>
</head>
<body>

<div class="guide-strip">🧑‍🏫 교사용 <b>운영 설명서</b> — 아래 5가지 중 하나를 누르면 항목이 펼쳐지고, 각 항목을 누르면 팝업 설명이 떠요</div>

<div class="topbar">
  <div class="site-name"><span class="cross">✝</span> 중등부 여름수련회</div>
  <span class="role-tag">교사용</span>
</div>

<div class="hero">
  <div class="hero-stars" id="heroStars"></div>
  <div class="hero-content">
    <span class="hero-cross">✝</span>
    <div class="hero-badge">2026 여름수련회 · 운영 가이드</div>
    <h1>교사용 운영 설명서</h1>
    <p>알고 싶은 분류를 골라보세요</p>
  </div>
</div>

<div class="wrap">
  <div class="home-hint">👇 <b>5가지 분류</b> 중 하나를 누르면 자세한 내용이 펼쳐져요</div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- 카테고리 상세 오버레이 -->
<div class="cat-ov" id="catOv">
  <div class="cat-topbar" id="catTopbar">
    <button class="cat-back" onclick="closeCat()">←</button>
    <span class="cat-toptit" id="catTopTit"></span>
  </div>
  <div class="cat-wrap">
    <div class="cat-lead" id="catLead"></div>
    <div id="catBody"></div>
  </div>
</div>

<!-- 팝업 -->
<div class="pop-overlay" id="popOverlay" onclick="if(event.target===this)closePop()">
  <div class="pop" id="popBox"></div>
</div>

<script>
/* ===== 카테고리 정의 ===== */
var CATS=[
  {key:'programs',wide:true,icon:'🗺️',cc:'#6366F1',cl:'#E0E7FF',title:'수련회 프로그램',count:'36개',

   lead:'일정 순서대로 정리된 36개 프로그램이에요. 각 「열기」를 누르면 운영 목적·준비·진행 순서·주의사항이 나옵니다. 배지: 🔑 API키 필요 · 키 불필요 · 팀 활동.'},
  {key:'setup',icon:'⚙️',cc:'#2563EB',cl:'#DBEAFE',title:'시작 전 세팅',count:'4가지',

   items:[
     {key:'scheduleInfo',icon:'📅',cls:'s-orange',name:'전체 일정표',desc:'36가지 활동 타임테이블'},
     {key:'mealInfo',icon:'🍽️',cls:'s-green',name:'식단표',desc:'3일 아침·점심·저녁'},
   ]},
];

/* ===== 매뉴얼 데이터 ===== */
var M={
  /* 세팅 */

/* ===== 렌더 ===== */
function renderHome(){
  var h='';
  CATS.forEach(function(c){
    h+='<div class="cat-card'+(c.wide?' wide':'')+'" style="--cc:'+c.cc+';--cl:'+c.cl+'" onclick="openCat(\''+c.key+'\')">'+
       '<div class="cat-ic">'+c.icon+'</div>'+
       '<div class="cat-body"><div class="cat-title">'+c.title+'</div><div class="cat-desc">'+c.desc+'</div></div>'+
       (c.wide?'<div class="cat-arrow">→</div>':'<span class="cat-count">'+c.count+'</span>');
    h+='</div>';
  });
  document.getElementById('catGrid').innerHTML=h;
}
function openCat(key){
  var c=CATS.find(function(x){return x.key===key;});
  if(!c)return;
  document.getElementById('catTopTit').textContent=c.icon+' '+c.title;
  document.getElementById('catTopbar').style.background='linear-gradient(135deg,'+c.cc+','+darken(c.cc)+')';
  document.getElementById('catLead').textContent=c.lead;
  var body='';
  if(c.key==='programs'){ body=renderFa(); }
  else {
    c.items.forEach(function(it){
      var d=M[it.key]||{};
      body+='<div class="item-card" style="--ic:'+(d.c||'#888')+'" onclick="showManual(\''+it.key+'\')">'+
            '<div class="item-ic '+it.cls+'">'+it.icon+'</div>'+
            '<div class="item-info"><div class="item-name">'+it.name+'</div><div class="item-desc">'+it.desc+'</div></div>'+
            '<button class="item-open" style="background:'+(d.c||'#888')+'" onclick="event.stopPropagation();showManual(\''+it.key+'\')">열기</button></div>';
    });
  }
  document.getElementById('catBody').innerHTML=body;
  document.getElementById('catOv').classList.add('open');
  document.getElementById('catOv').scrollTop=0;
  document.body.style.overflow='hidden';
}
function closeCat(){document.getElementById('catOv').classList.remove('open');document.body.style.overflow='';}

function renderFa(){
  var h='', inTrack=false, curTc='#C4B5FD';
  function closeTrack(){if(inTrack){h+='</div>';inTrack=false;}}
  FA.forEach(function(r){
    if(r.type==='day'){closeTrack();curTc=r.tc||'#C4B5FD';
      h+='<div class="fa-day-header"><div class="fa-day-pill" style="background:'+r.color+'">'+r.label+'</div><div class="fa-day-line"></div></div>';
      h+='<div class="fa-track" style="--tc:'+curTc+'">';inTrack=true;}
    else if(r.type==='sub'){h+='<div class="fa-sub" style="color:'+r.color+'">'+r.label+'</div>';}
    else if(r.type==='worship'){h+='<div class="fa-worship"><span class="fa-worship-icon">🙏</span><div><div class="fa-worship-txt">'+r.txt+'</div><div class="fa-worship-sub">'+r.sub+'</div></div></div>';}
    else if(r.type==='item'){
      var d=M[r.key]||{};var tags='';
      if(d.key===true)tags+='<span class="fa-tag tag-key">🔑 키</span>';
      if(d.key===false)tags+='<span class="fa-tag tag-nokey">키 불필요</span>';
      if(d.team)tags+='<span class="fa-tag tag-team">팀</span>';
      h+='<div class="fa-item" style="--ic:'+r.c+'" onclick="showManual(\''+r.key+'\')">'+
         '<div class="fa-num" style="background:'+hexLight(r.c)+';color:'+r.c+'">'+r.num+'</div>'+
         '<div class="fa-info"><div class="fa-name">'+r.name+'<span class="fa-time">⏱ '+r.time+'</span></div>'+
         '<div class="fa-desc">'+r.desc+'</div>'+(tags?'<div class="fa-tags">'+tags+'</div>':'')+'</div>'+
         '<button class="fa-open-btn" style="background:'+r.c+'" onclick="event.stopPropagation();showManual(\''+r.key+'\')">열기</button></div>';
    }
  });
  closeTrack();
  return h;
}
function hexLight(c){var map={'#EC4899':'#FCE7F3','#3B82F6':'#EFF6FF','#8B5CF6':'#F5F3FF','#F59E0B':'#FFFBEB','#10B981':'#ECFDF5'};return map[c]||'#F1F5F9';}
function darken(c){var map={'#EC4899':'#BE185D','#3B82F6':'#1E40AF','#8B5CF6':'#6D28D9','#F59E0B':'#B45309','#10B981':'#047857','#D97706':'#92400E','#7C3AED':'#5B21B6','#059669':'#065F46','#2563EB':'#1E40AF','#DC2626':'#991B1B','#6366F1':'#4338CA'};return map[c]||c;}

function showManual(key){
  var d=M[key]; if(!d)return;
  var steps='';(d.steps||[]).forEach(function(s){steps+='<div class="pop-step"><span>'+s+'</span></div>';});
  var spec='';(d.spec||[]).forEach(function(s){spec+='<li><b>'+s[0]+'</b><span>'+s[1]+'</span></li>';});
  var html=
    '<div class="pop-head" style="background:linear-gradient(135deg,'+d.c+','+darken(d.c)+')">'+
      '<button class="pop-close" onclick="closePop()">✕</button>'+
      '<div class="pop-icon-circle">'+d.icon+'</div>'+
      '<div class="pop-badge">'+d.badge+'</div>'+
      '<div class="pop-title">'+d.name+'</div>'+
      (d.time?'<div class="pop-time">⏱ '+d.time+'</div>':'')+
    '</div>'+
    '<div class="pop-body" style="--c:'+d.c+';--c2:'+darken(d.c)+'">'+
      '<div class="pop-what">'+d.what+'</div>'+
      (spec?'<div class="pop-sec-t">📋 운영 정보</div><ul class="pop-spec">'+spec+'</ul>':'')+
      '<div class="pop-sec-t">👉 진행 순서</div><div class="pop-steps">'+steps+'</div>'+
      (d.tip?'<div class="pop-tip"><b>💡 운영 팁 — </b>'+d.tip+'</div>':'')+
      (d.warn?'<div class="pop-warn">⚠️ '+d.warn+'</div>':'')+
    '</div>';
  var box=document.getElementById('popBox');box.innerHTML=html;box.scrollTop=0;
  document.getElementById('popOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePop(){document.getElementById('popOverlay').classList.remove('open');
  if(document.getElementById('catOv').classList.contains('open'))document.body.style.overflow='hidden';
  else document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){
  if(document.getElementById('popOverlay').classList.contains('open'))closePop();
  else if(document.getElementById('catOv').classList.contains('open'))closeCat();
}});

function makeStars(el,n){if(!el||el.children.length)return;for(var i=0;i<n;i++){var s=document.createElement('div');s.className='star-dot';var sz=(Math.random()*2+0.6);s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;animation-duration:'+(2+Math.random()*3)+'s;animation-delay:'+(Math.random()*2)+'s';el.appendChild(s);}}

renderHome();
makeStars(document.getElementById('heroStars'),34);
</script>
