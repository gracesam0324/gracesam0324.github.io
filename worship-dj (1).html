<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 내 감정 찬양 DJ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D0D1A;--bg2:#141428;--bg3:#1A1A35;
  --border:#2A2A4A;--white:#F0F0FF;--sub:#8888AA;--light:#5555AA;
  --shadow:0 4px 20px rgba(0,0,0,.4);
}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

/* 배경 그라디언트 */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(120,40,220,.15),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(40,120,255,.12),transparent 60%);pointer-events:none;z-index:0}

/* 음악 비주얼라이저 배경 */
.visualizer{position:fixed;bottom:0;left:0;right:0;height:80px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:0 20px;z-index:0;opacity:.18;pointer-events:none}
.vbar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,#7828DC,#2878FF);animation:vb ease-in-out infinite alternate}
@keyframes vb{from{transform:scaleY(.2)}to{transform:scaleY(1)}}

/* ── 탑바 ── */
.topbar{background:rgba(13,13,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:12px}
.back-btn{width:34px;height:34px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--sub);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit}
.topbar-tag{font-size:.68rem;font-weight:700;background:linear-gradient(135deg,#7828DC,#2878FF);color:white;padding:3px 9px;border-radius:5px;letter-spacing:.04em}
.topbar-title{font-size:.9rem;font-weight:700;color:var(--white);flex:1}

/* ── 히어로 ── */
.hero{position:relative;padding:32px 24px 24px;text-align:center;z-index:1}
.hero-disc{font-size:3rem;display:block;margin-bottom:12px;animation:spin 4s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hero-tag{display:inline-block;background:rgba(120,40,220,.2);border:1.5px solid rgba(120,40,220,.5);color:#C078FF;font-size:.72rem;font-weight:700;padding:5px 14px;border-radius:50px;margin-bottom:12px;letter-spacing:.06em}
.hero h1{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;color:var(--white);line-height:1.2;margin-bottom:8px}
.hero h1 em{background:linear-gradient(135deg,#C078FF,#78AAFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal}
.hero p{font-size:.83rem;color:var(--sub);line-height:1.75;max-width:360px;margin:0 auto}

/* ── 래퍼 ── */
.wrap{max-width:600px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1}

/* ── 감정 칩 ── */
.section-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--light);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.emotion-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.emo-chip{padding:9px 16px;border:1.5px solid var(--border);border-radius:50px;background:var(--bg2);cursor:pointer;font-size:.84rem;font-weight:600;color:var(--sub);font-family:inherit;transition:.2s;display:flex;align-items:center;gap:6px}
.emo-chip:hover{border-color:rgba(120,40,220,.5);color:var(--white)}
.emo-chip.on{border-color:#7828DC;background:rgba(120,40,220,.18);color:#C078FF;font-weight:700}

/* ── 자유 입력 ── */
.free-inp{width:100%;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;font-size:.88rem;font-family:inherit;color:var(--white);outline:none;transition:.2s;margin-bottom:20px}
.free-inp:focus{border-color:#7828DC;background:var(--bg3)}
.free-inp::placeholder{color:var(--light)}

/* ── 생성 버튼 ── */
.gen-btn{width:100%;padding:15px;background:linear-gradient(135deg,#7828DC,#2878FF);color:white;border:none;border-radius:12px;font-size:.95rem;font-weight:900;font-family:inherit;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.03em}
.gen-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── 로딩 ── */
.loading{text-align:center;padding:44px 20px;display:none}
.loading.show{display:block}
.loading-disc{font-size:2.8rem;display:block;margin-bottom:14px;animation:spin 1s linear infinite}
.loading-txt{font-size:1rem;font-weight:700;color:#C078FF;margin-bottom:6px}
.loading-sub{font-size:.78rem;color:var(--sub)}

/* ── 결과 ── */
.result-wrap{display:none;animation:fadeUp .4s ease}
.result-wrap.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.result-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
.rh-emoji{font-size:1.8rem}
.rh-text{flex:1}
.rh-label{font-size:.68rem;color:var(--sub);margin-bottom:2px}
.rh-emotion{font-size:.95rem;font-weight:700;color:#C078FF}

/* ── 플레이리스트 카드 ── */
.playlist{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.song-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:16px;transition:.2s;animation:fadeUp .3s ease both;cursor:pointer}
.song-card:nth-child(2){animation-delay:.06s}
.song-card:nth-child(3){animation-delay:.12s}
.song-card:nth-child(4){animation-delay:.18s}
.song-card:nth-child(5){animation-delay:.24s}
.song-card:hover{border-color:rgba(120,40,220,.6);background:rgba(120,40,220,.08);transform:translateY(-2px)}
.song-card-hint{font-size:.68rem;color:var(--light);margin-top:8px;text-align:right;letter-spacing:.03em}
.song-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.song-num{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#7828DC,#2878FF);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;color:white;flex-shrink:0}
.song-info{flex:1}
.song-title{font-size:.95rem;font-weight:800;color:var(--white);line-height:1.3}
.song-artist{font-size:.75rem;color:var(--sub);margin-top:2px}
.song-note{font-size:.78rem;color:rgba(192,120,255,.85);line-height:1.6;padding:8px 12px;background:rgba(120,40,220,.1);border-radius:8px;border-left:2px solid #7828DC}

/* ── 액션 ── */
.action-row{display:flex;gap:10px}
.btn-retry{flex:1;padding:13px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--sub);font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.btn-retry:hover{border-color:#7828DC;color:#C078FF}
.btn-copy{flex:1;padding:13px;background:linear-gradient(135deg,#7828DC,#2878FF);color:white;border:none;border-radius:12px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.btn-copy:hover{opacity:.9}
</style>
</head>
<body>

<!-- 비주얼라이저 -->
<div class="visualizer" id="viz"></div>

<div class="topbar">
  <span class="topbar-tag">중-4</span>
  <span class="topbar-title">오늘 내 감정 찬양 DJ</span>
</div>

<div class="hero">
  <span class="hero-disc">🎧</span>
  <div class="hero-tag">🎵 AI 찬양 추천 · 수련회 중 활동</div>
  <h1>지금 내 감정에 맞는<br><em>찬양 플레이리스트</em></h1>
  <p>현재 감정을 선택하면 AI가 딱 맞는<br>찬양곡을 골라드려요</p>
</div>

<div class="wrap">

  <!-- 감정 선택 -->
  <div style="margin-bottom:20px">
    <div class="section-label">지금 내 감정은?</div>
    <div class="emotion-grid" id="emoGrid">
      <button class="emo-chip" onclick="toggleEmo(this,'😊 기쁨')">😊 기쁨</button>
      <button class="emo-chip" onclick="toggleEmo(this,'🥺 위로가 필요해')">🥺 위로가 필요해</button>
      <button class="emo-chip" onclick="toggleEmo(this,'🙏 감사해')">🙏 감사해</button>
      <button class="emo-chip" onclick="toggleEmo(this,'😔 외로워')">😔 외로워</button>
      <button class="emo-chip" onclick="toggleEmo(this,'😰 두려워')">😰 두려워</button>
      <button class="emo-chip" onclick="toggleEmo(this,'🔥 열정이 넘쳐')">🔥 열정이 넘쳐</button>
      <button class="emo-chip" onclick="toggleEmo(this,'😢 슬퍼')">😢 슬퍼</button>
      <button class="emo-chip" onclick="toggleEmo(this,'✨ 설레')">✨ 설레</button>
      <button class="emo-chip" onclick="toggleEmo(this,'😤 지쳐')">😤 지쳐</button>
      <button class="emo-chip" onclick="toggleEmo(this,'🌱 성장하고 싶어')">🌱 성장하고 싶어</button>
      <button class="emo-chip" onclick="toggleEmo(this,'💪 도전하고 싶어')">💪 도전하고 싶어</button>
      <button class="emo-chip" onclick="toggleEmo(this,'🤍 평안해')">🤍 평안해</button>
    </div>
    <div class="section-label">또는 직접 적어줘요</div>
    <input class="free-inp" id="freeInp" placeholder="예) 친구랑 싸워서 마음이 무거워요 / 수련회가 너무 기대돼요...">
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">
    🎵 내 감정 찬양 받기
  </button>

  <!-- 로딩 -->
  <div class="loading" id="loading" style="margin-top:32px">
    <span class="loading-disc">🎵</span>
    <div class="loading-txt">AI DJ가 선곡 중이에요...</div>
    <div class="loading-sub">딱 맞는 찬양을 찾고 있어요</div>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="resultWrap" style="margin-top:24px">
    <div class="result-header">
      <span class="rh-emoji">🎧</span>
      <div class="rh-text">
        <div class="rh-label">지금 내 감정</div>
        <div class="rh-emotion" id="rhEmotion"></div>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
    <div class="action-row">
      <button class="btn-retry" onclick="reset()">↩ 다시 선택</button>
      <button class="btn-copy" onclick="copyAll()">📋 목록 복사</button>
    </div>
  </div>

</div>

<script>
/* ── 비주얼라이저 생성 ── */
(function(){
  var viz = document.getElementById('viz');
  for(var i=0;i<60;i++){
    var bar = document.createElement('div');
    bar.className = 'vbar';
    bar.style.height = (Math.random()*60+20)+'px';
    bar.style.animationDuration = (0.4+Math.random()*0.8)+'s';
    bar.style.animationDelay = (Math.random()*0.5)+'s';
    viz.appendChild(bar);
  }
})();

/* ── 감정 선택 ── */
var selectedEmos = [];

function toggleEmo(btn, emo){
  btn.classList.toggle('on');
  if(btn.classList.contains('on')){
    if(!selectedEmos.includes(emo)) selectedEmos.push(emo);
  } else {
    selectedEmos = selectedEmos.filter(function(e){return e!==emo});
  }
}

/* ── Claude API ── */
async function callClaude(prompt){
  var res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    })
  });
  var data = await res.json();
  return (data.content&&data.content[0]&&data.content[0].text)||'';
}

/* ── 생성 ── */
var lastEmotion = '';
var lastSongs = [];

async function generate(){
  var freeText = document.getElementById('freeInp').value.trim();
  var emotion = selectedEmos.join(', ') + (freeText ? (selectedEmos.length?', ':'')+freeText : '');

  if(!emotion){
    alert('감정을 선택하거나 직접 입력해주세요!');
    return;
  }

  lastEmotion = emotion;
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultWrap').classList.remove('show');

  var prompt = [
    '교회 중학생 수련회에서 학생이 지금 감정을 입력했어.',
    '감정: "' + emotion + '"',
    '',
    '이 감정에 딱 맞는 한국 CCM/찬양곡 4~5곡을 추천해줘.',
    '',
    '각 곡마다 아래 형식으로 정확히 답해줘:',
    '[SONG1]',
    '제목: 곡 제목',
    '아티스트: 가수/찬양팀 이름',
    '이유: 이 감정에 왜 어울리는지 1~2문장으로 (중학생이 이해하기 쉽게)',
    '',
    '[SONG2]',
    '제목:',
    '아티스트:',
    '이유:',
    '',
    '(이하 동일하게 SONG3, SONG4, SONG5까지)',
    '',
    '유명한 한국 CCM, 찬양, 복음성가 위주로. 실제로 존재하는 곡으로.'
  ].join('\n');

  try{
    var text = await callClaude(prompt);
    var songs = parseSongs(text);
    lastSongs = songs;

    document.getElementById('rhEmotion').textContent = emotion;
    renderPlaylist(songs);

    document.getElementById('loading').classList.remove('show');
    document.getElementById('resultWrap').classList.add('show');
  }catch(e){
    document.getElementById('loading').classList.remove('show');
    alert('오류가 발생했어요. 다시 시도해주세요.');
  }
  document.getElementById('genBtn').disabled = false;
}

function parseSongs(text){
  var songs = [];
  var blocks = text.split(/\[SONG\d+\]/);
  blocks.forEach(function(block){
    if(!block.trim()) return;
    var title = '', artist = '', reason = '';
    var lines = block.split('\n');
    lines.forEach(function(line){
      if(line.startsWith('제목:')) title = line.replace('제목:','').trim();
      if(line.startsWith('아티스트:')) artist = line.replace('아티스트:','').trim();
      if(line.startsWith('이유:')) reason = line.replace('이유:','').trim();
    });
    if(title) songs.push({title:title, artist:artist, reason:reason});
  });
  return songs;
}

function renderPlaylist(songs){
  var pl = document.getElementById('playlist');
  pl.innerHTML = '';
  songs.forEach(function(song, i){
    var div = document.createElement('div');
    div.className = 'song-card';
    div.innerHTML =
      '<div class="song-top">'+
        '<div class="song-num">'+(i+1)+'</div>'+
        '<div class="song-info">'+
          '<div class="song-title">🎵 '+escHtml(song.title)+'</div>'+
          '<div class="song-artist">'+escHtml(song.artist)+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="song-note">'+escHtml(song.reason)+'</div>'+
      '<div class="song-card-hint">📄 클릭하면 악보 검색 →</div>';
    div.onclick = function(){
      var query = encodeURIComponent(song.title + ' ' + song.artist + ' 악보');
      window.open('https://www.google.com/search?q=' + query, '_blank');
    };
    pl.appendChild(div);
  });
}

function reset(){
  selectedEmos = [];
  document.querySelectorAll('.emo-chip').forEach(function(c){c.classList.remove('on')});
  document.getElementById('freeInp').value = '';
  document.getElementById('resultWrap').classList.remove('show');
  window.scrollTo(0,0);
}

function copyAll(){
  var lines = ['🎧 오늘 내 감정 찬양 플레이리스트','감정: '+lastEmotion,''];
  lastSongs.forEach(function(s,i){
    lines.push((i+1)+'. '+s.title+' — '+s.artist);
    if(s.reason) lines.push('   → '+s.reason);
    lines.push('');
  });
  lines.push('2026 중등부 여름수련회');
  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    var btn = event.target;
    var orig = btn.textContent;
    btn.textContent = '✓ 복사됐어요!';
    setTimeout(function(){btn.textContent=orig},2000);
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
