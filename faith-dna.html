<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI 신앙 DNA 보고서</title>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0A1628;--card:#0F2040;--card2:#162844;--indigo:#6366F1;--teal:#14B8A6;--gold:#F59E0B;--sub:#64748B;--brd:#1E3A5F;--w:#F1F5F9}html,body{min-height:100%;background:var(--bg);font-family:-apple-system,"Noto Sans KR",sans-serif;color:var(--w);overflow-x:hidden}.topbar{height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;background:rgba(10,22,40,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}.back-btn{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--brd);color:var(--sub);font-size:1rem;cursor:pointer;font-family:inherit}.tag{font-size:.65rem;font-weight:700;background:var(--indigo);color:white;padding:3px 8px;border-radius:4px}.topbar-title{font-size:.88rem;font-weight:700;flex:1}.key-btn{font-size:.7rem;padding:5px 10px;background:var(--card);border:1px solid var(--brd);border-radius:6px;cursor:pointer;font-family:inherit;color:var(--sub)}.hero{padding:20px 16px 16px;text-align:center;border-bottom:1px solid var(--brd)}.hero-badge{display:inline-block;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#A5B4FC;font-size:.7rem;font-weight:700;padding:4px 14px;border-radius:50px;margin-bottom:8px}.hero h1{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:900;margin-bottom:4px}.hero h1 em{color:var(--indigo);font-style:normal}.hero p{font-size:.78rem;color:var(--sub);line-height:1.6}.wrap{max-width:560px;margin:0 auto;padding:16px 16px 80px}.progress-bar{background:var(--brd);border-radius:3px;height:4px;margin-bottom:16px}.progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--teal));border-radius:3px;transition:width .4s ease}.q-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px;animation:popIn .3s ease}@keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.q-num{font-size:.68rem;font-weight:700;color:var(--indigo);margin-bottom:6px}.q-text{font-size:.92rem;font-weight:700;color:var(--w);margin-bottom:12px;line-height:1.5}.options{display:flex;flex-direction:column;gap:6px}.opt{padding:11px 14px;border:1px solid var(--brd);border-radius:9px;background:var(--card2);cursor:pointer;font-size:.85rem;color:rgba(241,245,249,.8);font-family:inherit;text-align:left;transition:.15s;font-weight:500}.opt:hover{border-color:var(--indigo);color:var(--w)}.opt.on{border-color:var(--indigo);background:rgba(99,102,241,.15);color:#A5B4FC;font-weight:700}.next-btn{width:100%;padding:12px;background:var(--indigo);color:white;border:none;border-radius:9px;font-size:.9rem;font-weight:800;font-family:inherit;cursor:pointer;margin-top:12px}.next-btn:disabled{background:var(--brd);color:var(--sub);cursor:not-allowed}.loading{display:none;text-align:center;padding:28px;background:var(--card);border:1px solid var(--brd);border-radius:12px}.loading.show{display:block}.report{display:none;animation:popIn .5s ease}.report.show{display:block}.dna-header{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(20,184,166,.15));border:2px solid rgba(99,102,241,.4);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px}.dna-type{font-size:1.5rem;font-weight:900;color:#A5B4FC;margin-bottom:4px}.dna-sub{font-size:.78rem;color:var(--sub)}.dna-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}.dna-tag{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700}.rsec{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:13px;margin-bottom:10px}.rsec-t{font-size:.75rem;font-weight:700;color:var(--sub);margin-bottom:8px}.rsec-body{font-size:.83rem;line-height:1.7;color:rgba(241,245,249,.85)}.bar-row{margin-bottom:8px}.bar-label{font-size:.72rem;color:rgba(241,245,249,.7);margin-bottom:3px;display:flex;justify-content:space-between}.bar-bg{height:6px;background:var(--brd);border-radius:3px}.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}.again-btn{width:100%;padding:12px;border:1px solid var(--brd);border-radius:8px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;background:var(--card);color:var(--sub);margin-top:4px}.again-btn:hover{border-color:var(--indigo);color:var(--indigo)}.key-modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}.key-modal.open{display:flex}.key-box{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:22px;max-width:320px;width:90%}.key-box h3{font-weight:900;margin-bottom:6px}.key-box p{font-size:.78rem;color:var(--sub);margin-bottom:12px;line-height:1.6}.key-inp{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:7px;font-size:.85rem;font-family:inherit;background:var(--card2);color:var(--w);margin-bottom:8px}.key-save{width:100%;padding:11px;background:var(--indigo);color:white;border:none;border-radius:7px;font-weight:900;font-family:inherit;cursor:pointer}</style></head>
<body>
<div class="topbar"><button class="back-btn" onclick="window.location.href='index.html'">←</button><span class="tag">3D-②</span><span class="topbar-title">🧬 AI 신앙 DNA 보고서</span><button class="key-btn" onclick="openKeyModal()">🔑 API키</button></div>
<div class="hero"><div class="hero-badge">🔬 수련회 마지막 날 · 개인 분석</div><h1>나의 <em>신앙 DNA</em>를<br>발견하세요</h1><p>15가지 질문에 답하면 AI가 당신의 신앙 성향과 성장 방향을 분석해드려요</p></div>
<div class="wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="questionArea"></div>
  <div class="loading" id="loading"><div style="font-size:2rem">🧬</div><div style="font-size:.85rem;font-weight:700;color:#A5B4FC;margin-top:8px">AI가 신앙 DNA를 분석하는 중...</div></div>
  <div class="report" id="report"></div>
</div>
<div class="key-modal" id="keyModal"><div class="key-box"><h3>🔑 API 키 설정</h3><p>AI 분석에 필요해요.</p><input class="key-inp" id="keyInp" type="password" placeholder="sk-ant-..."><button class="key-save" onclick="saveKey()">저장하기</button></div></div>
<script>
function safeParseJSON(text){
  text=(text||'').replace(/```json|```/g,'').trim();
  var m=text.match(/\{[\s\S]*\}/);
  return JSON.parse(m?m[0]:text);
}
var QUESTIONS=[
  {q:"기도할 때 주로 어떤 방식으로 하나요?",opts:["혼자 조용히 마음으로 드려요","소리 내어 구체적으로 말해요","몸을 움직이며(무릎 꿇기, 손 들기)","일상 속에서 짧게 자주 해요"]},
  {q:"하나님을 가장 가깝게 느끼는 순간은?",opts:["예배와 찬양 중에","말씀을 읽거나 묵상할 때","다른 사람을 섬길 때","자연이나 조용한 공간에서"]},
  {q:"신앙의 어려움이 생겼을 때 주로 어떻게 하나요?",opts:["더 열심히 기도하고 말씀을 읽어요","신뢰할 수 있는 사람에게 털어놔요","혼자 생각하고 시간이 해결해줄 때까지 기다려요","활동이나 봉사로 돌파구를 찾아요"]},
  {q:"이번 수련회에서 가장 마음에 와닿은 것은?",opts:["설교 말씀의 내용","찬양 시간의 분위기","팀원들과의 관계","혼자 묵상한 시간"]},
  {q:"믿음이란 나에게 어떤 것인가요?",opts:["보이지 않는 것을 확신하는 것","매일 실천하는 삶의 방식","하나님과 나누는 개인적 관계","공동체와 함께 나누는 것"]},
  {q:"성경을 읽을 때 어떤 부분에 가장 끌리나요?",opts:["하나님의 성품과 속성","예수님의 삶과 가르침","역사와 예언의 성취","실생활 적용 가능한 지혜"]},
  {q:"교회에서 내가 가장 잘 할 수 있는 역할은?",opts:["가르치거나 설명하는 것","기도하고 중보하는 것","섬기고 도움을 주는 것","전도하고 관계 맺는 것"]},
  {q:"신앙 성장을 위해 가장 중요한 것은?",opts:["꾸준한 말씀 읽기와 기도","멘토나 교사와의 관계","봉사와 실천","공동체 예배 참여"]},
  {q:"수련회 전후로 가장 변화된 것은?",opts:["하나님에 대한 이해가 깊어졌어요","기도 생활이 달라졌어요","친구들과의 관계가 달라졌어요","삶의 방향이 조금 바뀐 것 같아요"]},
  {q:"하나님의 사랑을 가장 잘 느끼는 방식은?",opts:["말씀 속 약속을 통해","기도 응답을 통해","사람들의 사랑을 통해","환경과 상황 속에서"]},
  {q:"나의 신앙에서 가장 어려운 부분은?",opts:["의심과 질문이 생길 때","기도가 잘 안 될 때","다른 사람들과 신앙 나누기","말씀을 삶에 적용하기"]},
  {q:"앞으로 신앙 생활에서 더 집중하고 싶은 것은?",opts:["말씀 공부와 신학적 이해","기도와 영적 훈련","다른 사람 섬기기와 전도","예배와 찬양"]},
  {q:"나에게 가장 영향을 준 성경 이야기 유형은?",opts:["다윗처럼 실패 후 회복하는 이야기","바울처럼 극적으로 변화되는 이야기","에스더처럼 용기 있게 헌신하는 이야기","요셉처럼 오랜 시간 인내하는 이야기"]},
  {q:"수련회 이후 실천하고 싶은 것은?",opts:["매일 말씀 읽기","기도 시간 정하기","교회 봉사 참여","친구에게 신앙 나누기"]},
  {q:"나의 신앙을 한 단어로 표현한다면?",opts:["성장 중인 믿음","실천하는 믿음","탐구하는 믿음","공동체의 믿음"]},
];
var answers=[],curQ=0;
function render(){
  if(curQ>=QUESTIONS.length){showLoading();return;}
  var q=QUESTIONS[curQ];
  var pct=Math.round((curQ/QUESTIONS.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  var html='<div class="q-card"><div class="q-num">질문 '+(curQ+1)+' / '+QUESTIONS.length+'</div><div class="q-text">'+q.q+'</div><div class="options">'+
    q.opts.map((o,i)=>'<button class="opt" onclick="pickOpt(this,'+i+')">'+o+'</button>').join('')+'</div>'+
    '<button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>다음 →</button></div>';
  document.getElementById('questionArea').innerHTML=html;
  window.scrollTo(0,0);
}
function pickOpt(el,i){document.querySelectorAll('.opt').forEach(b=>b.classList.remove('on'));el.classList.add('on');answers[curQ]=i;document.getElementById('nextBtn').disabled=false;}
function nextQ(){if(answers[curQ]===undefined)return;curQ++;render();}
function showLoading(){
  var key=localStorage.getItem('retreat_api_key')||'';
  if(!key){openKeyModal();return;}
  document.getElementById('questionArea').innerHTML='';
  document.getElementById('loading').classList.add('show');
  generateReport();
}
async function generateReport(){
  var key=localStorage.getItem('retreat_api_key')||'';
  var answerText=QUESTIONS.map((q,i)=>'Q'+(i+1)+'. '+q.q+' → '+q.opts[answers[i]]).join('\n');
  var prompt='중학생 수련회 참가자의 신앙 DNA를 분석해줘.\n\n답변:\n'+answerText+'\n\naJSON만:\n{"type":"신앙 유형 이름 (예: 묵상형 탐구자, 실천형 섬김이, 공동체형 예배자 등 창의적으로)","description":"이 신앙 유형의 특성 2문장","strengths":["강점1","강점2","강점3"],"growth":["성장 방향1","성장 방향2"],"scores":{"prayer":80,"community":60,"action":70,"worship":75,"knowledge":65},"bible":"이 유형에게 맞는 성경 구절","encouragement":"이 학생을 향한 따뜻한 격려 한 마디"}';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})});
    if(!res.ok){var err=await res.json().catch(()=>({}));throw new Error('API '+res.status+': '+(err.error&&err.error.message||res.statusText));}
var d=await res.json();if(d.error)throw new Error(d.error.message);
    var p=safeParseJSON(d.content[0].text);
    document.getElementById('loading').classList.remove('show');
    showReport(p);
  }catch(e){document.getElementById('loading').classList.remove('show');alert('오류: '+e.message);}
}
function showReport(p){
  var colors=['#6366F1','#14B8A6','#F59E0B','#EC4899','#10B981'];
  var el=document.getElementById('report');
  var scores=p.scores||{};
  var scoreItems=Object.entries(scores).map(([k,v],i)=>'<div class="bar-row"><div class="bar-label"><span>'+({prayer:'기도',community:'공동체',action:'실천',worship:'예배',knowledge:'말씀'}[k]||k)+'</span><span>'+v+'</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+v+'%;background:'+colors[i%colors.length]+'"></div></div></div>').join('');
  var tags=[p.type].concat(p.strengths||[]);
  el.innerHTML='<div class="dna-header"><div style="font-size:.72rem;color:#A5B4FC;margin-bottom:4px">🧬 신앙 DNA 유형</div><div class="dna-type">'+esc(p.type)+'</div><div class="dna-sub">'+esc(p.description)+'</div><div class="dna-tags">'+tags.map((t,i)=>'<span class="dna-tag" style="background:'+colors[i%colors.length]+'22;color:'+colors[i%colors.length]+';border:1px solid '+colors[i%colors.length]+'44">'+esc(t)+'</span>').join('')+'</div></div>'+
    '<div class="rsec"><div class="rsec-t">📊 신앙 성향 분석</div>'+scoreItems+'</div>'+
    '<div class="rsec"><div class="rsec-t">✨ 성장 방향</div><div class="rsec-body">'+p.growth.map(g=>'• '+esc(g)).join('<br>')+'</div></div>'+
    '<div class="rsec" style="background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25)"><div class="rsec-t">📖 당신을 위한 말씀</div><div class="rsec-body" style="color:#A5B4FC">'+esc(p.bible)+'</div><div class="rsec-body" style="margin-top:8px;font-style:italic">'+esc(p.encouragement)+'</div></div>'+
    '<button class="again-btn" onclick="resetAll()">↩ 다시 분석하기</button>';
  el.classList.add('show');window.scrollTo(0,0);
}
function resetAll(){answers=[];curQ=0;document.getElementById('report').classList.remove('show');render();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function openKeyModal(){document.getElementById('keyModal').classList.add('open')}
function saveKey(){var k=document.getElementById('keyInp').value.trim();if(k){localStorage.setItem('retreat_api_key',k);document.getElementById('keyModal').classList.remove('open');}}
document.getElementById('keyModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')})
render();
</script></body></html>
