<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사랑이란? 창의력 대결</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFF5F7;--card:#FFFFFF;--card2:#FFF0F3;
  --red:#E11D48;--red2:#FB7185;--red3:#FFE4E8;
  --pink:#EC4899;--pink2:#F9A8D4;
  --gold:#F59E0B;--ink:#1F0A10;--sub:#6B7280;--border:#FECDD3;
}
html,body{min-height:100%;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);overflow-x:hidden}
body::before{content:'♥';position:fixed;font-size:30rem;color:var(--red3);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;opacity:.3;line-height:1}

.topbar{height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;background:rgba(255,245,247,.95);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border)}
.back-btn{width:34px;height:34px;border-radius:8px;background:var(--red3);border:1.5px solid var(--border);color:var(--red);font-size:1rem;cursor:pointer;font-family:inherit;font-weight:900;flex-shrink:0}
.tag{font-size:.65rem;font-weight:900;background:var(--red);color:white;padding:3px 8px;border-radius:4px}
.topbar-title{font-size:.88rem;font-weight:800;color:var(--ink);flex:1}
.key-btn{font-size:.7rem;padding:5px 10px;background:var(--red3);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;color:var(--sub)}

.hero{background:linear-gradient(135deg,var(--red) 0%,#BE185D 50%,#9D174D 100%);padding:26px 20px 22px;text-align:center;border-bottom:1.5px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'❤ ♡ ❤ ♡ ❤';position:absolute;top:8px;left:0;right:0;font-size:1rem;letter-spacing:8px;color:rgba(255,255,255,.18);white-space:nowrap}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;font-size:.7rem;font-weight:700;padding:4px 14px;border-radius:50px;margin-bottom:10px;letter-spacing:.06em}
.hero h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.4rem,5vw,2rem);color:white;line-height:1.2;margin-bottom:4px}
.hero h1 em{color:#FDE68A;font-style:normal}
.hero p{font-size:.78rem;color:rgba(255,255,255,.75);line-height:1.65}

.wrap{max-width:560px;margin:0 auto;padding:18px 16px 80px;position:relative;z-index:1}
.sec-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--red);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* 표현 방식 선택 */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.method-btn{padding:14px 10px;border:2px solid var(--border);border-radius:12px;background:white;cursor:pointer;font-family:inherit;text-align:center;transition:.2s;position:relative;overflow:hidden}
.method-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(225,29,72,.06),transparent);opacity:0;transition:.2s}
.method-btn:hover{border-color:var(--pink2);transform:translateY(-2px)}
.method-btn:hover::before{opacity:1}
.method-btn.on{border-color:var(--red);background:var(--red3)}
.method-btn.on::before{opacity:1}
.method-icon{font-size:1.8rem;display:block;margin-bottom:6px}
.method-name{font-size:.85rem;font-weight:800;color:var(--ink)}
.method-btn.on .method-name{color:var(--red)}
.method-desc{font-size:.68rem;color:var(--sub);margin-top:2px;line-height:1.4}

/* 팀 입력 섹션 */
.teams-section{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.team-card{background:white;border:2px solid;border-radius:14px;overflow:hidden;transition:.2s}
.team-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.team-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.team-name{font-size:.95rem;font-weight:800;flex:1}
.team-status{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
.team-status.done{background:#D1FAE5;color:#065F46}
.team-status.wait{background:#F3F4F6;color:#6B7280}
.team-input-area{padding:12px 16px;background:rgba(0,0,0,.02);border-top:1px solid rgba(0,0,0,.06)}
.team-prompt{font-size:.75rem;color:var(--sub);margin-bottom:8px;line-height:1.5;padding:8px 10px;background:rgba(0,0,0,.03);border-radius:6px;border-left:3px solid var(--pink2)}
.team-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;font-family:inherit;background:white;color:var(--ink);resize:none;min-height:90px;line-height:1.6}
.team-textarea:focus{outline:none;border-color:var(--red)}
.team-submit-btn{width:100%;padding:11px;background:var(--red);color:white;border:none;border-radius:9px;font-size:.88rem;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;transition:.15s}
.team-submit-btn:hover{opacity:.9}
.team-submitted{padding:10px 12px;background:var(--red3);border-radius:8px;margin-top:8px;font-size:.82rem;color:var(--red);line-height:1.6;font-style:italic}

/* 심사 버튼 */
.judge-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),#BE185D);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:900;font-family:inherit;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;box-shadow:0 4px 20px rgba(225,29,72,.3)}
.judge-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(225,29,72,.4)}
.judge-btn:disabled{background:#D1D5DB;cursor:not-allowed;transform:none;box-shadow:none}

/* 결과 */
.result-section{display:none}
.result-section.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.winner-card{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:2.5px solid var(--gold);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px}
.winner-trophy{font-size:3rem;display:block;margin-bottom:8px;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.winner-label{font-size:.72rem;font-weight:700;color:#92400E;letter-spacing:.1em;margin-bottom:4px}
.winner-team{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:#78350F}
.winner-reason{font-size:.82rem;color:#92400E;margin-top:8px;line-height:1.6}

.eval-card{background:white;border:1.5px solid;border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeUp .5s ease both}
.eval-card:nth-child(2){animation-delay:.05s}
.eval-card:nth-child(3){animation-delay:.1s}
.eval-card:nth-child(4){animation-delay:.15s}
.eval-card:nth-child(5){animation-delay:.2s}
.eval-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.eval-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.eval-name{font-size:.9rem;font-weight:800;flex:1}
.eval-score{font-size:1.1rem;font-weight:900;color:var(--red)}
.eval-text{font-size:.8rem;color:var(--sub);line-height:1.65}
.eval-submitted{font-size:.78rem;font-style:italic;color:var(--ink);border-left:3px solid var(--border);padding-left:10px;margin-top:6px;line-height:1.6}

.overall-card{background:var(--red3);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.overall-title{font-size:.85rem;font-weight:800;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.overall-text{font-size:.82rem;color:var(--ink);line-height:1.7}

.reset-btn{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;background:white;color:var(--sub);transition:.15s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* 로딩 */
.judge-loading{display:none;text-align:center;padding:30px 20px}
.judge-loading.show{display:block}
.heart-anim{font-size:2.5rem;animation:heartbeat .6s ease-in-out infinite alternate}
@keyframes heartbeat{from{transform:scale(1)}to{transform:scale(1.2)}}
.judge-loading-txt{font-weight:800;font-size:1rem;margin-top:10px;color:var(--red)}
.judge-loading-sub{font-size:.78rem;color:var(--sub);margin-top:4px}

/* 모달 */
.key-modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.key-modal.open{display:flex}
.key-box{background:white;border:2px solid var(--border);border-radius:14px;padding:24px 20px;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.key-box h3{font-weight:900;margin-bottom:6px;color:var(--ink)}
.key-box p{font-size:.78rem;color:var(--sub);margin-bottom:14px;line-height:1.6}
.key-inp{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;margin-bottom:10px}
.key-save{width:100%;padding:12px;background:var(--red);color:white;border:none;border-radius:8px;font-weight:900;font-family:inherit;cursor:pointer;font-size:.9rem}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <span class="tag">중-8</span>
  <span class="topbar-title">❤️ 사랑이란? 창의력 대결</span>
  <button class="key-btn" onclick="openKeyModal()">🔑 API키</button>
</div>

<div class="hero">
  <div class="hero-badge">💕 2일차 오후 · 14:30–15:30 · 팀 대결</div>
  <h1>사랑이란<br><em>무엇일까요?</em></h1>
  <p>각 팀이 사랑을 가장 창의적으로 표현하면<br>AI 심판이 우승 팀을 결정해요</p>
</div>

<div class="wrap">

  <!-- 표현 방식 선택 -->
  <div class="sec-label">표현 방식 선택</div>
  <div class="method-grid" id="methodGrid">
    <button class="method-btn on" onclick="pickMethod(this,'poem','짧은 시')">
      <span class="method-icon">📝</span>
      <div class="method-name">짧은 시</div>
      <div class="method-desc">4~8줄의 시로 표현</div>
    </button>
    <button class="method-btn" onclick="pickMethod(this,'lyrics','노래 가사')">
      <span class="method-icon">🎵</span>
      <div class="method-name">노래 가사</div>
      <div class="method-desc">후렴구 포함 가사 창작</div>
    </button>
    <button class="method-btn" onclick="pickMethod(this,'skit','짧은 콩트')">
      <span class="method-icon">🎭</span>
      <div class="method-name">짧은 콩트</div>
      <div class="method-desc">2인 대화로 표현</div>
    </button>
    <button class="method-btn" onclick="pickMethod(this,'definition','창의적 정의')">
      <span class="method-icon">💡</span>
      <div class="method-name">창의적 정의</div>
      <div class="method-desc">비유로 사랑을 설명</div>
    </button>
    <button class="method-btn" onclick="pickMethod(this,'list','사랑 목록')">
      <span class="method-icon">📋</span>
      <div class="method-name">사랑 목록</div>
      <div class="method-desc">사랑이란 ~이다 5가지</div>
    </button>
    <button class="method-btn" onclick="pickMethod(this,'acrostic','삼행시')">
      <span class="method-icon">✨</span>
      <div class="method-name">삼행시</div>
      <div class="method-desc">"사·랑·이" 삼행시</div>
    </button>
  </div>

  <!-- 팀별 작성 -->
  <div class="sec-label">팀별 작성</div>
  <div class="teams-section" id="teamsSection"></div>

  <!-- 심사 버튼 -->
  <button class="judge-btn" id="judgeBtn" onclick="runJudge()" disabled>
    ⚖️ AI 심판에게 맡기기
  </button>

  <!-- 로딩 -->
  <div class="judge-loading" id="judgeLoading">
    <div class="heart-anim">❤️</div>
    <div class="judge-loading-txt">AI 심판이 사랑을 느끼는 중...</div>
    <div class="judge-loading-sub">각 팀의 표현을 감상하고 있어요</div>
  </div>

  <!-- 결과 -->
  <div class="result-section" id="resultSection">
    <div class="sec-label">심사 결과</div>
    <div class="winner-card" id="winnerCard">
      <span class="winner-trophy">🏆</span>
      <div class="winner-label">오늘의 우승 팀</div>
      <div class="winner-team" id="winnerTeam"></div>
      <div class="winner-reason" id="winnerReason"></div>
    </div>
    <div id="evalCards"></div>
    <div class="overall-card" id="overallCard">
      <div class="overall-title">💕 AI 심판의 한 마디</div>
      <div class="overall-text" id="overallText"></div>
    </div>
    <button class="reset-btn" onclick="resetAll()">↩ 다시 하기</button>
  </div>

</div>

<div class="key-modal" id="keyModal">
  <div class="key-box">
    <h3>🔑 Claude API 키 설정</h3>
    <p>AI 심판을 사용하려면 API 키가 필요해요. 이 기기에만 저장돼요.</p>
    <input class="key-inp" id="keyInp" type="password" placeholder="sk-ant-...">
    <button class="key-save" onclick="saveKey()">저장하기</button>
  </div>
</div>

<script>
var TEAMS = [
  {name:'베드로팀', color:'#3B82F6', light:'#DBEAFE'},
  {name:'바울팀',   color:'#10B981', light:'#D1FAE5'},
  {name:'에스더팀', color:'#8B5CF6', light:'#EDE9FE'},
  {name:'다윗팀',   color:'#EF4444', light:'#FEE2E2'},
];

var METHODS = {
  poem:       {label:'짧은 시',       guide:'사랑이란 무엇인지 4~8줄의 시로 표현해주세요. 비유와 감성을 담아요.'},
  lyrics:     {label:'노래 가사',     guide:'사랑을 주제로 후렴구가 포함된 노래 가사를 창작해주세요.'},
  skit:       {label:'짧은 콩트',     guide:'두 사람이 대화하는 짧은 콩트로 사랑을 표현해주세요. (이름A: 대사 형식)'},
  definition: {label:'창의적 정의',   guide:'"사랑이란 ___이다." 형식으로 기발하고 깊이 있는 비유 3가지를 써주세요.'},
  list:       {label:'사랑 목록',     guide:'"사랑이란 ~이다"로 시작하는 문장 5가지를 각각 한 줄 설명과 함께 써주세요.'},
  acrostic:   {label:'삼행시',        guide:'"사", "랑", "이" 세 글자로 시작하는 삼행시를 지어주세요. 성경적 의미를 담으면 좋아요.'},
};

var selMethod = 'poem';
var submissions = {}; // {teamIdx: text}

function pickMethod(btn, method) {
  document.querySelectorAll('.method-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  selMethod = method;
  renderTeams();
}

function renderTeams() {
  var guide = METHODS[selMethod].guide;
  var section = document.getElementById('teamsSection');
  section.innerHTML = '';
  submissions = {};
  updateJudgeBtn();

  TEAMS.forEach(function(team, i) {
    var card = document.createElement('div');
    card.className = 'team-card';
    card.style.borderColor = team.color;
    card.id = 'teamCard' + i;
    card.innerHTML =
      '<div class="team-header">'+
        '<div class="team-dot" style="background:'+team.color+'"></div>'+
        '<div class="team-name">'+team.name+'</div>'+
        '<div class="team-status wait" id="status'+i+'">작성 중</div>'+
      '</div>'+
      '<div class="team-input-area">'+
        '<div class="team-prompt">📝 '+esc(guide)+'</div>'+
        '<textarea class="team-textarea" id="input'+i+'" placeholder="'+team.name+'의 작품을 입력하세요..."></textarea>'+
        '<button class="team-submit-btn" style="background:'+team.color+'" onclick="submitTeam('+i+')">제출하기</button>'+
      '</div>';
    section.appendChild(card);
  });
}

function submitTeam(i) {
  var text = document.getElementById('input'+i).value.trim();
  if(!text){ alert('내용을 입력해주세요!'); return; }
  submissions[i] = text;

  var area = document.getElementById('teamCard'+i).querySelector('.team-input-area');
  area.innerHTML =
    '<div class="team-submitted">'+esc(text)+'</div>';
  document.getElementById('status'+i).textContent = '제출 완료 ✅';
  document.getElementById('status'+i).className = 'team-status done';
  updateJudgeBtn();
}

function updateJudgeBtn() {
  var count = Object.keys(submissions).length;
  var btn = document.getElementById('judgeBtn');
  btn.disabled = count < 4;
  btn.innerHTML = count < 4
    ? '⚖️ AI 심판에게 맡기기 (' + count + '/4팀 제출)'
    : '⚖️ AI 심판에게 맡기기';
}

async function runJudge() {
  var key = localStorage.getItem('retreat_api_key') || '';
  if(!key){ openKeyModal(); return; }

  document.getElementById('judgeBtn').style.display = 'none';
  document.getElementById('judgeLoading').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');
  window.scrollTo(0, document.body.scrollHeight);

  var methodLabel = METHODS[selMethod].label;
  var allWork = TEAMS.map(function(t, i) {
    return '【'+t.name+' / '+methodLabel+'】\n'+(submissions[i]||'');
  }).join('\n\n');

  var prompt = '너는 중학생 수련회 창의력 대결의 AI 심판이야. 중학생 눈높이로 따뜻하게 평가해줘.\n\n'+
    '주제: 사랑이란 무엇인가?\n표현 방식: '+methodLabel+'\n\n'+
    '4팀의 작품:\n'+allWork+'\n\n'+
    '아래 형식으로 심사 결과를 작성해줘:\n\n'+
    '[우승팀] 팀 이름만 (베드로팀/바울팀/에스더팀/다윗팀 중 하나)\n'+
    '[우승이유] 우승한 이유 (2문장)\n'+
    '[베드로팀평가] 강점과 아쉬운 점 한 줄씩\n'+
    '[바울팀평가] 강점과 아쉬운 점 한 줄씩\n'+
    '[에스더팀평가] 강점과 아쉬운 점 한 줄씩\n'+
    '[다윗팀평가] 강점과 아쉬운 점 한 줄씩\n'+
    '[점수] 베드로팀:85 바울팀:78 에스더팀:90 다윗팀:82\n'+
    '[총평] 오늘 대결 전체 소감 + 사랑에 대한 성경적 한 마디 (3문장)';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);
    renderResult(data.content[0].text);
  } catch(e) {
    document.getElementById('judgeLoading').classList.remove('show');
    document.getElementById('judgeBtn').style.display = 'flex';
    alert('오류: ' + e.message);
  }
}

function extract(text, tag) {
  var m = text.match(new RegExp('\\['+tag+'\\]([\\s\\S]*?)(?=\\[|$)'));
  return m ? m[1].trim() : '';
}

function renderResult(text) {
  document.getElementById('judgeLoading').classList.remove('show');

  var winner = extract(text, '우승팀');
  var winnerReason = extract(text, '우승이유');
  var overall = extract(text, '총평');

  // 점수 파싱
  var scoreStr = extract(text, '점수');
  var scores = {};
  scoreStr.split(' ').forEach(function(part) {
    var m = part.match(/(.+?):(\d+)/);
    if(m) scores[m[1].trim()] = parseInt(m[2]);
  });

  document.getElementById('winnerTeam').textContent = winner;
  document.getElementById('winnerReason').textContent = winnerReason;
  document.getElementById('overallText').textContent = overall;

  var evalContainer = document.getElementById('evalCards');
  evalContainer.innerHTML = '';
  TEAMS.forEach(function(team, i) {
    var evalText = extract(text, team.name+'평가');
    var score = scores[team.name] || 80;
    var card = document.createElement('div');
    card.className = 'eval-card';
    card.style.borderColor = team.color;
    card.innerHTML =
      '<div class="eval-header">'+
        '<div class="eval-dot" style="background:'+team.color+'"></div>'+
        '<div class="eval-name">'+team.name+'</div>'+
        '<div class="eval-score">'+score+'점</div>'+
      '</div>'+
      '<div class="eval-submitted">'+esc(submissions[i]||'')+'</div>'+
      '<div class="eval-text" style="margin-top:8px">'+esc(evalText)+'</div>';
    evalContainer.appendChild(card);
  });

  document.getElementById('resultSection').classList.add('show');
  setTimeout(function(){ window.scrollTo(0, document.body.scrollHeight); }, 100);
}

function resetAll() {
  submissions = {};
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('judgeBtn').style.display = 'flex';
  document.querySelectorAll('.method-btn').forEach(function(b){ b.classList.remove('on'); });
  document.querySelector('.method-btn').classList.add('on');
  selMethod = 'poem';
  renderTeams();
  window.scrollTo(0, 0);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function openKeyModal(){ document.getElementById('keyModal').classList.add('open'); }
function closeKeyModal(){ document.getElementById('keyModal').classList.remove('open'); }
function saveKey(){
  var k = document.getElementById('keyInp').value.trim();
  if(k){ localStorage.setItem('retreat_api_key', k); closeKeyModal(); }
}
document.getElementById('keyModal').addEventListener('click', function(e){ if(e.target===this) closeKeyModal(); });

renderTeams();
</script>
</body>
</html>
