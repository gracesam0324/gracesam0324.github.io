<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Apps</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0F0F1A;--surface:#1A1A2E;--card:#222244;
  --border:#2A2A4A;--text:#E8E8F0;--sub:#8888AA;
  --accent1:#6C5CE7;--accent2:#00CEC9;--accent3:#FD79A8;--accent4:#FDCB6E;
}
body{
  font-family:-apple-system,'Pretendard','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(108,92,231,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(0,206,201,.08) 0%, transparent 50%);
}

/* ── Header ── */
header{
  text-align:center;padding:80px 20px 20px;
}
.logo{
  font-size:2.4rem;font-weight:900;
  background:linear-gradient(135deg,#6C5CE7,#00CEC9,#FD79A8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
header p{color:var(--sub);font-size:1rem;font-weight:400}

/* ── Grid ── */
.container{max-width:960px;margin:0 auto;padding:40px 20px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

/* ── Card ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;transition:all .35s ease;
  cursor:pointer;position:relative;text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.3);
  border-color:rgba(108,92,231,.4);
}
.card-banner{
  height:160px;display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;position:relative;overflow:hidden;
}
.card-banner::before{
  content:'';position:absolute;inset:0;opacity:.15;
}
.card-banner.grad1::before{background:linear-gradient(135deg,#6C5CE7,#A29BFE)}
.card-banner.grad2::before{background:linear-gradient(135deg,#00CEC9,#55EFC4)}
.card-banner.grad3::before{background:linear-gradient(135deg,#FD79A8,#FDCB6E)}
.card-banner.grad4::before{background:linear-gradient(135deg,#0984E3,#74B9FF)}

.card-body{padding:20px 24px 24px;flex:1;display:flex;flex-direction:column}
.card-body h3{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.card-body p{font-size:.85rem;color:var(--sub);line-height:1.6;flex:1}

.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.tag{
  font-size:.68rem;padding:4px 10px;border-radius:50px;
  background:rgba(108,92,231,.15);color:#A29BFE;font-weight:600;
}
.tag.t2{background:rgba(0,206,201,.15);color:#00CEC9}
.tag.t3{background:rgba(253,121,168,.15);color:#FD79A8}

.card-arrow{
  position:absolute;top:20px;right:20px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);display:flex;
  align-items:center;justify-content:center;
  font-size:.8rem;transition:.3s;opacity:0;
}
.card:hover .card-arrow{opacity:1;transform:translateX(2px)}

/* ── Coming Soon Card ── */
.card.soon{opacity:.5;cursor:default;border-style:dashed}
.card.soon:hover{transform:none;box-shadow:none;border-color:var(--border)}
.soon-label{
  position:absolute;top:14px;right:14px;
  font-size:.65rem;padding:3px 10px;border-radius:50px;
  background:rgba(255,255,255,.08);color:var(--sub);font-weight:600;
}

/* ── Footer ── */
footer{text-align:center;padding:40px 20px;color:var(--sub);font-size:.78rem}
footer a{color:var(--accent1);text-decoration:none}

/* ── Responsive ── */
@media(max-width:640px){
  header{padding:60px 20px 10px}
  .logo{font-size:1.8rem}
  .grid{grid-template-columns:1fr}
}

/* ── Animation ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .5s ease forwards;opacity:0}
.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.2s}
.card:nth-child(3){animation-delay:.3s}
.card:nth-child(4){animation-delay:.4s}
</style>
</head>
<body>

<header>
  <div class="logo">My Apps</div>
  <p>교회 중등부를 위한 앱 모음</p>
</header>

<div class="container">
  <div class="grid">

    <!-- ✅ 앱 카드 1: 인생지도 일기 -->
    <a class="card" href="https://gracesam0324.github.io/life-map/">
      <div class="card-banner grad1">📝</div>
      <div class="card-body">
        <h3>인생지도 일기</h3>
        <p>매일 감정과 신앙 상태를 기록하고, AI가 영적 피드백을 제공하는 일기 앱</p>
        <div class="card-tags">
          <span class="tag">감정기록</span>
          <span class="tag t2">AI 피드백</span>
          <span class="tag t3">그래프</span>
        </div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <!-- 🔒 Coming Soon 카드 (예시 - 복사해서 새 앱 추가) -->
    <div class="card soon">
      <span class="soon-label">Coming Soon</span>
      <div class="card-banner grad2">🙏</div>
      <div class="card-body">
        <h3>다음 앱 준비 중...</h3>
        <p>새로운 앱이 곧 추가될 예정이에요!</p>
        <div class="card-tags">
          <span class="tag t2">준비중</span>
        </div>
      </div>
    </div>

    <!--
    ============================================
    🆕 새 앱 추가하려면 아래를 복사해서 붙여넣기:
    ============================================

    <a class="card" href="앱 링크 URL">
      <div class="card-banner grad3">이모지</div>
      <div class="card-body">
        <h3>앱 이름</h3>
        <p>앱 설명</p>
        <div class="card-tags">
          <span class="tag">태그1</span>
          <span class="tag t2">태그2</span>
        </div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    배너 색상: grad1(보라) grad2(민트) grad3(핑크) grad4(파랑)
    태그 색상: tag(보라) t2(민트) t3(핑크)
    ============================================
    -->

  </div>
</div>

<footer>
  <p>Made with ❤️ for 중등부 여름수련회</p>
</footer>

</body>
</html>
